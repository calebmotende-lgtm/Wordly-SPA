<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly - Single Page Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <header>
            <h1>Wordly</h1>
            <p>Your interactive dictionary</p>
        </header>

        <section class="search-box">
            <input type="text" id="word-input" placeholder="Type a word here..." aria-label="Search word">
            <button id="search-btn">Search</button>
        </section>

        <section id="result-display" class="result-container">
            <div class="welcome-msg">Search for a word to see its definition, synonyms, and more.</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
